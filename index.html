<html>
    <head>
        <title>America Simulator</title>
        <link rel="stylesheet" href="styles.css"></link>
    </head>
    <body>
        <div id="america">
            <h1 id="title"><span id="secretbutton">A</span>merica Simulator</h1>
            <button id="click">
            </button>
            <h1><span id="dollar">$</span><span id="number">0</span></h1>
            <h3 id="cssrate">+$<span id="rate">0</span>/sec</h1>
        <div id="background">
            <video autoplay muted loop playsinline preload="auto">
                <source src="flag.mp4" type="video/mp4">
                Your browser doesn't support the video tag.
            </video>
        </div>
        <div id="shop">
            <button id="child" class="shopbutton"><h1 class="shoptitle">Child Labor</h1> 
                <p class="shopdesc">Not so hard working children to acquire official USD at a rate of <strong>+$0.5 per second</strong></p> 
                <h3 id="childshopamt" class="shopamt">0</h3> <h3 class="price">$<span id="childprice">10</span></h3>
            </button>

           <button id="labor" class="shopbutton"><h1 class="shoptitle">Unpaid Labor</h1> 
                <p class="shopdesc">Free labor to make official USD at a rate of <strong>+$2 per second</strong></p> 
                <h3 id="laborshopamt" class="shopamt">0</h3> <h3 class="price">$<span id="laborprice">50</span></h3>
            </button>
             <button id="clanker" class="shopbutton"><h1 class="shoptitle">Robots</h1> 
                <p class="shopdesc">Robots that work 24/7 to obtain official USD at a rate of <strong>+$5 per second</strong></p> 
                <h3 id="clankershopamt" class="shopamt">0</h3> <h3 class="price">$<span id="clankerprice">125</span></h3>
            </button>
            <button id="diabetes" class="shopbutton"><h1 class="shoptitle">Diabetes Medication</h1> 
                <p class="shopdesc">Less Diabetes makes clicking power<strong> 2x stronger</strong></p> 
                <h3 id="diabetesshopamt" class="shopamt">0</h3> <h3 class="price">$<span id="diabetesprice">500</span></h3>
            </button>
                <button id="nuclear" class="shopbutton"><h1 class="shoptitle">Nuclear Technology</h1> 
                <p class="shopdesc">Nuclear Technology that produces official USD at a rate of<strong> +$15 per second</strong></p> 
                <h3 id="nuclearshopamt" class="shopamt">0</h3> <h3 class="price">$<span id="nuclearprice">750</span></h3>
            </button>
            <button id="cyber" class="shopbutton"><h1 class="shoptitle">Cybertrump</h1> 
                <p class="shopdesc">Cybertrump creates official USD at a rate of<strong> +$25 per second</strong></p> 
                <h3 id="cybershopamt" class="shopamt">0</h3> <h3 class="price">$<span id="cyberprice">1250</span></h3>
            </button>
            <div id="upgrades-panel">
    <div id="upgrades-menu">

        <div class="upgrade-category">
            <div class="upgrade-category-label">Child Labor</div>
            <div class="upgrade-row">
                <button id="lsd" class="upgrade">
                    <h1>LSD</h1>
                    <p>Drugs to make children work <strong>1.5x faster</strong></p>
                    <h3>$<span id="lsdprice">100</span></h3>
                </button>
                <button id="whips" class="upgrade">
                    <h1>Whips</h1>
                    <p>Whips make children work <strong>2x harder</strong></p>
                    <h3>$<span id="whipsprice">750</span></h3>
                </button>
            </div>
        </div>

        <div class="upgrade-category">
            <div class="upgrade-category-label">Unpaid Labor</div>
            <div class="upgrade-row">
                <button id="threat" class="upgrade">
                    <h1>Threats</h1>
                    <p>Threaten worker's families to make them work <strong>1.5x faster</strong></p>
                    <h3>$<span id="threatprice">250</span></h3>
                </button>
            </div>
        </div>

        <div class="upgrade-category">
            <div class="upgrade-category-label">Robots</div>
            <div class="upgrade-row">
                <button id="generator" class="upgrade">
                    <h1>Generators</h1>
                    <p>Generators make robots work <strong>1.5x faster</strong></p>
                    <h3>$<span id="generatorprice">500</span></h3>
                </button>
            </div>
        </div>

        <div class="upgrade-category">
            <div class="upgrade-category-label">Nuclear Technology</div>
            <div class="upgrade-row">
                <button id="fusion" class="upgrade">
                    <h1>Nuclear Fusion</h1>
                    <p>Nuclear fusion makes nuclear technology <strong>1.5x faster</strong></p>
                    <h3>$<span id="fusionprice">1500</span></h3>
                </button>
            </div>
        </div>

        <div class="upgrade-category">
            <div class="upgrade-category-label">Cybertrump</div>
            <div class="upgrade-row">
                <button id="oil" class="upgrade">
                    <h1>Better Oil</h1>
                    <p>Better oil makes Cybertrump work <strong>1.5x faster</strong></p>
                    <h3>$<span id="oilprice">2250</span></h3>
                </button>
            </div>
        </div>

    </div>
    <button id="upgrades-toggle">Upgrades</button>
</div>


        </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
